<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Supermarket</title>

<style>


*{
    box-sizing: border-box;
}

body{
    background-color: aliceblue;
    margin: 0;
    font-family: Georgia, 'Times New Roman', Times, serif;
    font-weight: bold;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.page-wrapper{
    width: 100%;
    min-height: 100vh;
    background-color: white;
    border: 8px solid green;
    border-radius: 100px;
    overflow: hidden;
    box-sizing: border-box;
}

/* HEADER */
header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 30px;
    background-color: ghostwhite;
}

.logo{
    display: flex;
    align-items: center;
}

.logo img{
    width: 80px;
    margin-right: 10px;
}

.navigation a{
    color: green;
    text-decoration: none;
    margin-left: 20px;
    padding: 5px 10px;
}

.navigation a:hover{
    background-color: black;
    color: white;
    border-radius: 5px;
}

.content{
    padding: 20px;
}

.image{
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
}

.image-point{
    text-align: center;
    margin: 20px;
}

.image-point img{
    width: 150px;
    height: 150px;
}

button{
    padding: 5px 10px;
    cursor: pointer;
}

input{
    width: 50px;
    text-align: center;
}

</style>
</head>

<body>

<div class="page-wrapper">

<header>
    <div class="logo">
        <img src="images/main.png">
        <h1>Anna Supermarket</h1>
    </div>

    <nav class="navigation">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Founder's Desk</a>
        <a href="#">Contact Us</a>
    </nav>
</header>

<div class="content">

<h2>🛍️ Products</h2>

<div class="image">

<div class="image-point">
<img src="images/fruits.png">
<p>Fruits - ₹100</p>
<input type="number" id="q1" value="1" min="1">
<br><br>
<button onclick="addToCart('Fruits',100,'images/fruits.png','q1')">Add</button>
</div>

<div class="image-point">
<img src="images/veggies.png">
<p>Vegetables - ₹80</p>
<input type="number" id="q2" value="1" min="1">
<br><br>
<button onclick="addToCart('Vegetables',80,'images/veggies.png','q2')">Add</button>
</div>

<div class="image-point">
<img src="images/groceries.png">
<p>Groceries - ₹150</p>
<input type="number" id="q3" value="1" min="1">
<br><br>
<button onclick="addToCart('Groceries',150,'images/groceries.png','q3')">Add</button>
</div>

<div class="image-point">
<img src="images/dairy.png">
<p>Dairy - ₹120</p>
<input type="number" id="q4" value="1" min="1">
<br><br>
<button onclick="addToCart('Dairy',120,'images/dairy.png','q4')">Add</button>
</div>

<div class="image-point">
<img src="images/sweet.png">
<p>Sweets - ₹200</p>
<input type="number" id="q5" value="1" min="1">
<br><br>
<button onclick="addToCart('Sweets',200,'images/sweet.png','q5')">Add</button>
</div>

</div>

<h2>Cart</h2>
<div id="cart"></div>

<div style="text-align:center; margin-top:20px;">
<a href="checkout.html">
<button>Proceed to Checkout ➡️</button>
</a>
</div>

</div>

<script>
function addToCart(name, price, image, qtyId) {
    let qty = parseInt(document.getElementById(qtyId).value);

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({ name, price, image, qty });

    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function displayCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let output = "";
    let total = 0;

    if (cart.length === 0) {
        output = "<p>Cart is empty</p>";
    } else {
        cart.forEach((item, index) => {
            let itemTotal = item.price * item.qty;
            total += itemTotal;

            output += `
            <p>
                ${item.name} (x${item.qty}) - ₹${itemTotal}
                <button onclick="removeItem(${index})">❌</button>
            </p>`;
        });

        output += `<h3>Total: ₹${total}</h3>`;
    }

    document.getElementById("cart").innerHTML = output;
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart"));
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

window.onload = displayCart;
</script>

</div>
</body>
</html>
