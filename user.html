<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Supermarket</title>

<style>
    body{
        background-color: aliceblue;
        margin: 0;
        font-family: Georgia, 'Times New Roman', Times, serif;
        font-size: medium;
        font-weight: bold;
        display: flex;
        justify-content: center;
        padding: 20px;
    }

    /* OVAL PAGE BORDER */
    .page-wrapper{
        width: 100%;
        min-height: 100vh;
        background-color: white;
        border: 8px solid green;
        border-radius: 100px;
        overflow: hidden;
        box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        box-sizing: border-box;
    }

    header{
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 30px;
        background-color: ghostwhite;
    }

    .logo{
        display: flex;
        align-items: center;
    }

    .logo img{
        width: 80px;
        margin-right: 10px;
    }

    .navigation a{
        color: green;
        text-decoration: none;
        margin-left: 20px;
        padding: 5px 10px;
        transition: 0.3s;
    }

    .navigation a:hover{
        background-color: black;
        color: white;
        border-radius: 5px;
    }

</style>
</head>

<body>

<div class="page-wrapper">

<header>
    <div class="logo">
        <img src="images/main.png" alt="logo">
        <h1>Anna Supermarket</h1>
    </div>

    <nav class="navigation">
        <a href="transitionsite.html">Home</a>
        <a href="#">Products</a>
        <a href="#">Founder's Desk</a>
        <a href="#">Contact Us</a>
    </nav>
</header>

<form id="myform">
    <label for="username">Username: </label>
    <input type="text" id="username"><br><br>

    <label for="name">Name: </label>
    <input type="text" id="name"><br><br>

    <label for="email">Email ID: </label>
    <input type="email" id="email"><br><br>

    <input type="submit" value="Submit">
    <input type="button" value="Show Data" onclick="showData()"></form>

<div id="details" style="margin-top:20px;"></div>
<div id="result" style="margin-top:20px;"></div>

<script>
document.getElementById("myform").addEventListener("submit", function(event){
    event.preventDefault();

    let username = document.getElementById("username").value;
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if(username === "" || name === "" || email === ""){
        alert("Please fill all fields!");
        return;
    }

    let userData = {
        username: username,
        name: name,
        email: email
    };

    // Save to localStorage
    localStorage.setItem("contactData", JSON.stringify(userData));
    
    saveData();
    
    alert("Data saved successfully!");

    document.getElementById("myform").reset();
});

function saveData() {
    let name = document.getElementById("name").value;

    let data = localStorage.getItem("users");

    if (data == null) {
        data = [];
    } else {
        data = JSON.parse(data);
    }

    data.push(name);

    localStorage.setItem("users", JSON.stringify(data));
}

function showData() {
    let data = JSON.parse(localStorage.getItem("users"));

    document.getElementById("result").innerText = data;
}


</script>

</div>

</body>

</html>
